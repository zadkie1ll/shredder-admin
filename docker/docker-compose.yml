services:
  shredder-admin:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: shredder-admin:v0.1
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "${SHREDDER_ADMIN_PUBLIC_PORT:-8015}:8015"
    volumes:
      - ../seed:/app/seed:ro
    networks:
      - remnawave-network

networks:
  remnawave-network:
    external: true
